<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คชื่อออนไลน์ MHS2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Prompt', sans-serif; }
    body { background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); min-height: 100vh; color: #e2e8f0; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-blur: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
    .glow-indigo { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
    
    /* ปรับแต่ง Scrollbar */
    .log-item { animation: fadeIn 0.5s ease-out; border-left: 4px solid #6366f1; background: rgba(99, 102, 241, 0.1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    
    /* ซ่อนลูกศร Dropdown ดั้งเดิมของ Datalist ในบางเบราว์เซอร์ให้ดูสะอาดขึ้น */
    input::-webkit-calendar-picker-indicator { display: none !important; }
  </style>
</head>
<body class="p-4 md:p-10">

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
      <a href="index.html" class="text-slate-400 hover:text-white transition-all">← กลับหน้าหลัก</a>
      <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight">📍 ระบบเช็คชื่อออนไลน์</h1>
      <div class="hidden md:block w-20"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-5">
        <div class="glass-card glow-indigo p-8 h-full border-t border-indigo-500/30">
          <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-indigo-400">📝 ลงทะเบียนเข้าประชุม</h3>
          <form id="checkinForm" class="space-y-6">
            
            <div>
              <label class="block text-sm text-slate-400 mb-2">ค้นหาชื่อโรงเรียน (176 แห่ง)</label>
              <input type="text" id="schoolInput" list="schoolOptions" 
       placeholder="พิมพ์ชื่อโรงเรียนเพื่อค้นหา..." 
       autocomplete="off"
       onfocus="this.value=''; this.click();" 
       class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500">
<datalist id="schoolOptions"></datalist>
            </div>

            <div>
              <label class="block text-sm text-slate-400 mb-2">ชื่อ-นามสกุล</label>
              <input type="text" id="userName" class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500" placeholder="ระบุชื่อจริง-นามสกุล" required>
            </div>

            <div>
              <label class="block text-sm text-slate-400 mb-2">ตำแหน่ง</label>
              <select id="userPosition" class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500" required>
                <option value="">-- เลือกตำแหน่ง --</option>
                <option value="ผอ.โรงเรียน">ผอ.โรงเรียน</option>
                <option value="รอง ผอ.โรงเรียน">รอง ผอ.โรงเรียน</option>
                <option value="ครูพัสดุ">ครูพัสดุ</option>
                <option value="ครู">ครู</option>
                <option value="ธุรการโรงเรียน">ธุรการโรงเรียน</option>
                <option value="ผู้แทน">ผู้แทน</option>
                <option value="อื่นๆ">อื่นๆ</option>
              </select>
            </div>
            <button type="submit" id="btnSubmit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-xl transition-all shadow-lg shadow-indigo-500/30">
              บันทึกการเช็คชื่อ
            </button>
          </form>
        </div>
      </div>

      <div class="lg:col-span-7">
        <div class="glass-card glow-indigo p-8 h-full">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="text-center">
              <h3 class="text-lg font-bold mb-4 text-left">สถานะภาพรวม</h3>
              <div class="relative h-60 w-full flex items-center justify-center">
                <canvas id="myChart"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                  <span id="percentDisplay" class="text-5xl font-black text-indigo-400">0%</span>
                  <span class="text-[10px] text-slate-500 tracking-[0.2em] uppercase mt-1">Checked In</span>
                </div>
              </div>
              <div id="countDisplay" class="mt-4 p-3 bg-slate-900/50 rounded-xl"></div>
            </div>

            <div>
              <h3 class="text-lg font-bold mb-4 flex justify-between items-center">
                <span>🔔 ล่าสุด (Live Log)</span>
                <span class="px-2 py-1 bg-green-500/20 text-green-400 text-[10px] rounded animate-pulse font-bold">REALTIME</span>
              </h3>
              <div id="activityLog" class="space-y-3 h-[250px] overflow-y-auto pr-2 custom-scrollbar text-sm">
                <div class="text-slate-600 text-center py-10 italic">รอข้อมูลเข้า...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyW-33Zqrb3giadq-wzNIRt5aUJ8Lgum4c_qVc_8NmcLJeo1yxB134l35gwQyuQ20_D/exec";
    let myChart;
    let logData = {};
    let validSchools = []; // เก็บรายชื่อโรงเรียนไว้เช็คความถูกต้อง

    window.onload = () => {
      initChart();
      updateData();
      setInterval(updateData, 20000); 
    };

    function initChart() {
      const ctx = document.getElementById('myChart').getContext('2d');
      myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['มาแล้ว', 'ยังไม่มา'],
          datasets: [{ data: [0, 100], backgroundColor: ['#6366f1', '#0f172a'], borderWidth: 0 }]
        },
        options: { cutout: '85%', plugins: { legend: { display: false } } }
      });
    }

<script>
    let currentLogState = []; // ตัวแปรเก็บรายชื่อเพื่อเช็คคนใหม่

    async function updateData() {
      try {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        
        // 1. ดึงข้อมูลโรงเรียนใส่ Datalist (ทำครั้งเดียวเมื่อโหลดหน้า)
        const datalist = document.getElementById('schoolOptions');
        if (datalist.options.length === 0 && data.schoolList) {
            validSchools = data.schoolList; 
            data.schoolList.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                datalist.appendChild(opt);
            });
        }

        // 2. อัปเดตกราฟและตัวเลขสรุป
        myChart.data.datasets[0].data = [data.attendedCount, data.missingCount];
        myChart.update();

        document.getElementById('percentDisplay').innerText = ((data.attendedCount / data.totalCount) * 100).toFixed(0) + "%";
        document.getElementById('countDisplay').innerHTML = `
          <div class="text-sm space-y-1 text-center">
            <div class="text-indigo-400 font-bold">มาแล้ว: ${data.attendedCount} จาก ${data.totalCount}</div>
            <div class="text-rose-400">ยังไม่มา: ${data.missingCount} จาก ${data.totalCount}</div>
          </div>
        `;

        // 3. ระบบ Live Log: เช็ครายชื่อใหม่จาก Server และแสดงผล
        const logContainer = document.getElementById('activityLog');
        if (logContainer && data.recentLogs) {
            // กรองเอาเฉพาะรายชื่อที่ยังไม่เคยโชว์บนหน้าจอ
            const newEntries = data.recentLogs.filter(n => 
                !currentLogState.some(old => old.school === n.school && old.details === n.details)
            );

            if (newEntries.length > 0) {
                // ถ้ามีข้อมูลใหม่ ให้ลบคำว่า "รอข้อมูลเข้า..." ออก
                if (logContainer.innerHTML.includes("รอข้อมูล")) logContainer.innerHTML = "";

                // รวมข้อมูลใหม่เข้ากับของเดิม (เอาของใหม่ไว้บนสุด) และจำกัดไว้ 20 รายการ
                currentLogState = [...newEntries, ...currentLogState].slice(0, 20);

                logContainer.innerHTML = ''; // ล้างเพื่อวาดใหม่ให้ลำดับถูกต้อง
                currentLogState.forEach((log, index) => {
                    const isNewest = index < newEntries.length; // เช็คว่าเป็นชื่อที่เพิ่งเด้งมาใหม่รอบนี้ไหม
                    const div = document.createElement('div');
                    div.className = `p-3 rounded-xl mb-2 text-white border-l-4 shadow-lg transition-all duration-500 ${
                        isNewest ? 'border-yellow-400 bg-indigo-600 animate-pulse' : 'border-indigo-500 bg-slate-800/50'
                    }`;
                    div.innerHTML = `
                        <div class="flex justify-between items-center font-bold">
                            <span class="${isNewest ? 'text-yellow-200' : 'text-indigo-300'}">${log.school}</span>
                            ${isNewest ? '<span class="text-[9px] bg-yellow-500 text-black px-2 py-0.5 rounded-full font-black">LATEST</span>' : ''}
                        </div>
                        <div class="text-[11px] text-slate-400 mt-1">📍 ${log.details}</div>
                    `;
                    logContainer.appendChild(div);
                });
            }
        }
      } catch (err) { console.log("Load failed", err); }
    }

    // ฟังก์ชันบันทึกข้อมูล
    document.getElementById('checkinForm').onsubmit = async (e) => {
      e.preventDefault();
      const school = document.getElementById('schoolInput').value;
      
      if (!validSchools.includes(school)) {
          alert("❌ กรุณาเลือกหรือพิมพ์ชื่อโรงเรียนให้ตรงกับในฐานข้อมูลครับ");
          return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; 
      btn.innerText = "กำลังบันทึก...";

      const position = document.getElementById('userPosition').value;
      const name = document.getElementById('userName').value;

      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ school, name, position }) });
        const result = await res.json();
        
        if (result.status === "success" || result.status === "exists") {
          document.getElementById('checkinForm').reset();
          await updateData(); // ดึงข้อมูลล่าสุดทันทีหลังบันทึก
          if(result.status === "exists") alert("เพิ่มรายชื่อผู้เข้าร่วมเรียบร้อยครับ");
          else alert("บันทึกการเช็คชื่อสำเร็จ!");
        }
      } catch (err) { alert("ล้มเหลว กรุณาลองใหม่"); }
      btn.disabled = false; btn.innerText = "บันทึกการเช็คชื่อ";
    };

    // เริ่มทำงานครั้งแรกและตั้งเวลาอัปเดตทุก 10 วินาที
    updateData();
    setInterval(updateData, 10000); 
  </script>
</body>
</html>
