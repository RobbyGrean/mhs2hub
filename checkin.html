<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อออนไลน์ - ไข่พัสดุ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-indigo { box-shadow: 0 0 20px rgba(79, 70, 229, 0.2); }
        /* สไตล์พิเศษสำหรับ Scrollbar ของ Live Log */
        #activityLog::-webkit-scrollbar { width: 4px; }
        #activityLog::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 text-white">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <a href="index.html" class="text-slate-400 hover:text-white transition-all">← กลับหน้าหลัก</a>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                📍 ระบบเช็คชื่อออนไลน์
            </h1>
            <div class="hidden md:block w-20"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5">
                <div class="glass-card glow-indigo p-8 rounded-3xl border-t-4 border-indigo-500">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-indigo-400">
                        📝 ลงทะเบียนเข้าประชุม
                    </h3>
                    
                    <form id="checkinForm" class="space-y-5">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">1. เลือกอำเภอ</label>
                            <select id="amphureSelect" onchange="filterTambon()" class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                                <option value="">-- กรุณาเลือกอำเภอ --</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-slate-400 mb-2">2. เลือกตำบล</label>
                            <select id="tambonSelect" onchange="filterSchool()" disabled class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed">
                                <option value="">-- กรุณาเลือกตำบล --</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm text-slate-400 mb-2">3. เลือกโรงเรียน</label>
                            <select id="schoolSelect" disabled class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer disabled:opacity-30">
                                <option value="">-- กรุณาเลือกโรงเรียน --</option>
                            </select>
                        </div>

                        <hr class="border-white/5 my-2">

                        <div>
                            <label class="block text-sm text-slate-400 mb-2">ชื่อ-นามสกุล</label>
                            <input type="text" id="userName" required placeholder="ระบุชื่อจริง-นามสกุล" class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500">
                        </div>

                        <div>
                            <label class="block text-sm text-slate-400 mb-2">ตำแหน่ง</label>
                            <select id="userPosition" required class="w-full p-4 rounded-xl outline-none bg-slate-900/90 border border-white/10 text-white focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                                <option value="">-- เลือกตำแหน่ง --</option>
                                <option value="ผอ.โรงเรียน">ผอ.โรงเรียน</option>
                                <option value="รอง ผอ.โรงเรียน">รอง ผอ.โรงเรียน</option>
                                <option value="ครูพัสดุ">ครูพัสดุ</option>
                                <option value="ครู">ครู</option>
                                <option value="ธุรการโรงเรียน">ธุรการโรงเรียน</option>
                            </select>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full mt-4 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                            บันทึกการเช็คชื่อ
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 rounded-3xl flex flex-col items-center">
                        <div class="relative w-40 h-40">
                            <canvas id="myChart"></canvas>
                            <div id="percentDisplay" class="absolute inset-0 flex items-center justify-center text-3xl font-bold text-indigo-400">0%</div>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                        <h4 class="text-slate-400 mb-4 font-medium uppercase tracking-widest text-xs">สถานะปัจจุบัน</h4>
                        <div id="countDisplay" class="space-y-2">
                             <div class="text-2xl font-bold text-indigo-400 animate-pulse">กำลังโหลด...</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-3xl h-[400px] flex flex-col">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-yellow-400">
                        🔔 ล่าสุด (Live Activity)
                    </h3>
                    <div id="activityLog" class="flex-1 overflow-y-auto pr-2 space-y-3">
                        <div class="text-center text-slate-500 mt-10 italic">รอข้อมูลการลงทะเบียน...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyW-33Zqrb3giadq-wzNIRt5aUJ8Lgum4c_qVc_8NmcLJeo1yxB134l35gwQyuQ20_D/exec"; 
        let rawSchoolData = [];
        let currentLogState = [];

        // ตั้งค่า Chart
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['มาแล้ว', 'ยังไม่มา'],
                datasets: [{
                    data: [0, 100],
                    backgroundColor: ['#6366f1', '#1e293b'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });

        async function updateData() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                
                // 1. จัดการข้อมูล Master สำหรับ Dropdown (ทำครั้งเดียวตอนเริ่ม)
                if (rawSchoolData.length === 0 && data.schoolData) {
                    rawSchoolData = data.schoolData;
                    const ampSelect = document.getElementById('amphureSelect');
                    const amphures = [...new Set(rawSchoolData.map(d => d.amphure))].sort();
                    amphures.forEach(a => {
                        const opt = document.createElement('option');
                        opt.value = opt.innerText = a;
                        ampSelect.appendChild(opt);
                    });
                }

                // 2. อัปเดตยอดและกราฟ
                myChart.data.datasets[0].data = [data.attendedCount, data.missingCount];
                myChart.update();
                document.getElementById('percentDisplay').innerText = ((data.attendedCount / data.totalCount) * 100).toFixed(0) + "%";
                document.getElementById('countDisplay').innerHTML = `
                    <div class="text-sm space-y-2">
                        <div class="px-4 py-2 bg-indigo-500/20 rounded-full text-indigo-400 font-bold border border-indigo-500/30">มาแล้ว: ${data.attendedCount} จาก ${data.totalCount}</div>
                        <div class="px-4 py-2 bg-rose-500/10 rounded-full text-rose-400 font-medium border border-rose-500/20">ยังไม่มา: ${data.missingCount} จาก ${data.totalCount}</div>
                    </div>`;

                // 3. ระบบ Live Log อัจฉริยะ
                const logContainer = document.getElementById('activityLog');
                if (logContainer && data.recentLogs) {
                    const newEntries = data.recentLogs.filter(n => 
                        !currentLogState.some(old => old.school === n.school && old.details === n.details)
                    );

                    if (newEntries.length > 0) {
                        if (logContainer.innerHTML.includes("รอข้อมูล")) logContainer.innerHTML = "";
                        
                        // รวมข้อมูลใหม่และจำกัดแค่ 20 อันล่าสุด
                        currentLogState = [...newEntries, ...currentLogState].slice(0, 20);
                        logContainer.innerHTML = '';
                        
                      // ส่วนแสดงผล Live Log แบบเน้นชื่อตัวใหญ่
currentLogState.forEach((log, index) => {
    const isNew = index < newEntries.length;
    logContainer.innerHTML += `
        <div class="p-5 rounded-2xl text-white border-l-8 shadow-2xl transition-all duration-700 ${
            isNew ? 'border-yellow-400 bg-indigo-600 animate-pulse scale-[1.02]' : 'border-indigo-500 bg-slate-800/60'
        }">
            <div class="flex justify-between items-start">
                <div class="w-full">
                    <div class="text-sm font-medium ${isNew ? 'text-indigo-200' : 'text-slate-400'} mb-1">
                        🏫 ${log.school}
                    </div>
                    <div class="text-2xl md:text-3xl font-bold ${isNew ? 'text-white' : 'text-indigo-100'} tracking-wide">
                        👤 ${log.details}
                    </div>
                </div>
                ${isNew ? '<span class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs font-black animate-bounce shadow-lg">NEW</span>' : ''}
            </div>
        </div>`;
});
                    }
                }
            } catch (err) { console.error("Load failed", err); }
        }

        // ฟังก์ชันกรองรายชื่อ 3 ชั้น
        function filterTambon() {
            const amp = document.getElementById('amphureSelect').value;
            const tamSelect = document.getElementById('tambonSelect');
            const schSelect = document.getElementById('schoolSelect');
            
            tamSelect.innerHTML = '<option value="">-- กรุณาเลือกตำบล --</option>';
            schSelect.innerHTML = '<option value="">-- กรุณาเลือกโรงเรียน --</option>';
            schSelect.disabled = true;

            if (amp) {
                const tambons = [...new Set(rawSchoolData.filter(d => d.amphure === amp).map(d => d.tambon))].sort();
                tambons.forEach(t => { tamSelect.innerHTML += `<option value="${t}">${t}</option>`; });
                tamSelect.disabled = false;
            } else { tamSelect.disabled = true; }
        }

        function filterSchool() {
            const amp = document.getElementById('amphureSelect').value;
            const tam = document.getElementById('tambonSelect').value;
            const schSelect = document.getElementById('schoolSelect');
            
            schSelect.innerHTML = '<option value="">-- กรุณาเลือกโรงเรียน --</option>';
            if (tam) {
                const schools = rawSchoolData.filter(d => d.amphure === amp && d.tambon === tam).sort((a,b) => a.name.localeCompare(b.name));
                schools.forEach(s => { schSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
                schSelect.disabled = false;
            } else { schSelect.disabled = true; }
        }

        // ฟังก์ชันบันทึกข้อมูล
        document.getElementById('checkinForm').onsubmit = async (e) => {
            e.preventDefault();
            const school = document.getElementById('schoolSelect').value;
            if (!school) { alert("⚠️ กรุณาเลือกโรงเรียนให้ครบถ้วนครับ"); return; }
            
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "กำลังบันทึกข้อมูล...";
            
            const name = document.getElementById('userName').value;
            const pos = document.getElementById('userPosition').value;

            try {
                const res = await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ school, name, position: pos }) 
                });
                const result = await res.json();
                
                if (result.status === "success" || result.status === "exists") {
                    alert(result.status === "exists" ? "ชื่อนี้ได้รับการลงทะเบียนไปแล้วครับ" : "บันทึกสำเร็จ! ขอบคุณครับ");
                    document.getElementById('checkinForm').reset();
                    document.getElementById('tambonSelect').disabled = true;
                    document.getElementById('schoolSelect').disabled = true;
                    await updateData();
                }
            } catch (err) { alert("❌ เกิดข้อผิดพลาด กรุณาลองใหม่"); }
            btn.disabled = false; btn.innerText = "บันทึกการเช็คชื่อ";
        };

        // เริ่มทำงาน
        updateData();
        setInterval(updateData, 10000); // อัปเดตทุก 10 วินาที
    </script>
</body>
</html>
