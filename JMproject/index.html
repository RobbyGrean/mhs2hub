<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Project - ระบบติดตามสถานะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-['Kanit']">

    <div class="container mx-auto px-4 py-10">
        <!-- Header Section -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                JM Project
            </h1>
            <p class="text-slate-400 text-lg">ระบบติดตามสถานะเบิกจ่ายจ้างเหมาบริการ 245 เขตพื้นที่</p>
        </header>

        <!-- Toolbar: ปุ่มพิมพ์รายงาน (Direct Print) -->
        <div class="flex justify-center mb-10">
            <button onclick="generatePendingReport()" 
                    class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full shadow-lg shadow-red-900/40 transition-all flex items-center gap-2 transform hover:scale-105 active:scale-95">
                <span>🖨️ พิมพ์รายงาน PDF (เขตที่ค้าง)</span>
            </button>
        </div>

        <!-- Search & Filter Bar -->
        <div class="mb-10 max-w-4xl mx-auto flex flex-col md:flex-row gap-4">
            <!-- Dropdown เลือกภาค -->
            <select id="regionFilter" onchange="filterList()" 
                    class="bg-slate-800 text-white p-4 rounded-xl border-2 border-slate-700 outline-none focus:border-blue-500 transition-all cursor-pointer shadow-xl">
                <option value="">ทุกภาค</option>
                <option value="ภาคเหนือ">ภาคเหนือ</option>
                <option value="ภาคตะวันออกเฉียงเหนือ">ภาคตะวันออกเฉียงเหนือ</option>
                <option value="ภาคกลาง">ภาคกลาง</option>
                <option value="ภาคตะวันออก">ภาคตะวันออก</option>
                <option value="ภาคตะวันตก">ภาคตะวันตก</option>
                <option value="ภาคใต้">ภาคใต้</option>
            </select>

            <!-- กล่องค้นหาพร้อม Guide -->
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-4 flex items-center text-slate-500">🔍</span>
                <input type="text" id="searchBox" onkeyup="filterList()" 
                       placeholder="พิมพ์ชื่อจังหวัด ชื่อเขต หรือชื่อภาค (เช่น อีสาน) เพื่อค้นหา..." 
                       class="w-full p-4 pl-12 rounded-xl bg-slate-800 text-white border-2 border-slate-700 focus:border-blue-500 outline-none transition-all shadow-xl">
            </div>
        </div>

        <!-- Main Content: รายการเขตพื้นที่ -->
        <div id="loading" class="text-center text-blue-400 text-xl py-20">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent rounded-full mb-4"></div>
            <p>กำลังดึงข้อมูลจากระบบฐานข้อมูล...</p>
        </div>

        <div id="itemList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            <!-- รายการจะแสดงที่นี่ -->
        </div>
    </div>

    <!-- Hidden Report Container (ใช้สำหรับพิมพ์เท่านั้น ไม่แสดงบนหน้าจอ) -->
    <div id="reportSection" class="hidden">
        <div id="reportContent" class="p-8 text-black bg-white"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
