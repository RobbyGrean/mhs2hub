<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Project - ระบบติดตามการเบิกจ่าย</title>
    <!-- เรียกใช้ Tailwind CSS และ Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body class="p-4 bg-slate-950 text-slate-200">

    <div class="max-w-5xl mx-auto">
        <!-- Header: ชื่อโปรเจกต์ตัวเบ้อเริ่ม -->
        <header class="py-10 text-center">
            <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2 tracking-tight">
                JM Project
            </h1>
            <p class="text-xl text-slate-400 font-light italic">ระบบติดตามสถานะเบิกจ่ายจ้างเหมาบริการ 245 เขตพื้นที่</p>
        </header>

        <!-- แถบเครื่องมือ: ค้นหา และ รายงาน (ให้ชาวบ้านเห็นชัดๆ) -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="flex-1">
                <input type="text" id="searchBox" onkeyup="filterList()" 
                       placeholder="🔍 พิมพ์ชื่อจังหวัด หรือชื่อเขตเพื่อค้นหา..." 
                       class="search-input w-full shadow-2xl outline-none">
            </div>
            <button onclick="generatePendingReport()" 
                    class="bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-2xl font-bold text-xl transition-all shadow-lg flex items-center justify-center gap-2">
                <span>📄</span> ดึงรายงานเขตที่ค้างจ่าย
            </button>
        </div>

        <!-- รายชื่อแบบ Card Base: ตัวหนังสือใหญ่สะใจตาสีตาสา -->
        <div id="list-container" class="space-y-4">
            <p class="text-center py-20 text-2xl animate-pulse">กำลังซิงค์ข้อมูลจากศูนย์ควบคุมอวกาศ...</p>
        </div>

        <!-- โซนรายงาน (จะซ่อนไว้ก่อน) -->
        <div id="reportSection" class="hidden my-10 p-8 bg-white text-slate-900 rounded-[40px] shadow-2xl border-t-8 border-red-500">
            <div class="flex justify-between items-center mb-6 border-b-2 border-slate-100 pb-4">
                <h2 class="text-4xl font-black text-red-600 tracking-tighter">⚠️ รายชื่อเขตที่เงินยังไม่ออก</h2>
                <button onclick="closeReport()" class="text-slate-300 hover:text-slate-900 text-4xl">✕</button>
            </div>
            <div id="reportContent" class="overflow-x-auto">
                <!-- รายชื่อจากระบบจะมาโผล่ตรงนี้ -->
            </div>
            <div class="mt-8 pt-6 border-t border-dashed border-slate-200 flex justify-between items-center">
                <p id="reportTimestamp" class="text-slate-400 italic"></p>
                <button onclick="window.print()" class="px-10 py-4 bg-slate-800 text-white rounded-2xl font-bold text-lg hover:bg-black transition">
                    🖨️ พิมพ์รายงาน (PDF)
                </button>
            </div>
        </div>
    </div>

    <!-- 🌌 Space Preview Card: แสดงลิงก์และ Thumbnail แบบลอยฟ้า -->
    <div id="previewCard" class="hidden fixed bottom-10 right-4 md:right-10 z-50 w-[350px] transform transition-all duration-700 scale-0 opacity-0 pointer-events-none">
        <div class="bg-slate-900/90 backdrop-blur-2xl border-2 border-blue-500/50 rounded-[40px] overflow-hidden shadow-[0_0_60px_rgba(59,130,246,0.5)]">
            <div id="thumbnailArea" class="w-full h-44 bg-slate-800 relative">
                <img id="prevImg" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
            </div>
            <div class="p-8 text-center">
                <h4 id="prevName" class="text-3xl font-black text-white mb-4 tracking-tighter leading-tight">ชื่อเขตพื้นที่</h4>
                <a id="prevLink" href="#" target="_blank" 
                   class="pointer-events-auto inline-block w-full py-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-400 hover:to-blue-300 text-white rounded-2xl font-black text-xl transition-all shadow-[0_10px_20px_rgba(0,0,0,0.3)]">
                   🌐 เปิดเว็บไซต์เขต
                </a>
            </div>
        </div>
    </div>

    <!-- Modal ยืนยัน: กันชาวบ้านมือลั่น -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-950/95 backdrop-blur-xl flex items-center justify-center z-[100] p-6">
        <div class="bg-slate-900 border-2 border-white/10 p-10 rounded-[50px] max-w-md w-full shadow-[0_0_80px_rgba(0,0,0,0.5)] text-center">
            <div class="text-7xl mb-6 animate-bounce">🔔</div>
            <h3 class="text-4xl font-black mb-4 text-white tracking-tighter">ยืนยันอีกครั้ง?</h3>
            <p id="modalText" class="text-2xl text-slate-400 mb-10 font-light leading-relaxed"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="py-5 bg-slate-800 text-white rounded-3xl text-2xl font-bold">ยกเลิก</button>
                <button id="confirmBtn" class="py-5 bg-blue-600 text-white rounded-3xl text-2xl font-black shadow-xl shadow-blue-900/50">ใช่ ออกแล้ว!</button>
            </div>
        </div>
    </div>

    <!-- เรียกไฟล์ JavaScript -->
    <script src="script.js"></script>
</body>
</html>
