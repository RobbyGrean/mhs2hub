<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Project - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-['Kanit']">

    <div class="container mx-auto px-4 py-10">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                JM Project
            </h1>
            <p class="text-slate-400">ระบบติดตามสถานะเบิกจ่ายจ้างเหมาบริการ 245 เขตพื้นที่</p>
        </header>

        <!-- Tools -->
        <div class="flex justify-center mb-10">
            <button onclick="generatePendingReport()" 
                    class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-rose-900/40 transition-all transform hover:scale-105">
                🖨️ พิมพ์รายงาน PDF (เขตที่ค้าง)
            </button>
        </div>

        <!-- Dashboard Bar (ช่องค้นหาและตัวกรอง) -->
        <div class="filter-container mb-6 max-w-5xl mx-auto p-3 rounded-2xl flex flex-col md:flex-row gap-3">
            <select id="regionFilter" onchange="filterList()" 
                    class="bg-blue-600 text-white font-bold p-4 rounded-xl outline-none cursor-pointer shadow-lg border-b-4 border-blue-800">
                <option value="">🌐 เลือกภาคทั้งหมด</option>
                <option value="ภาคเหนือ">⛰️ ภาคเหนือ</option>
                <option value="ภาคตะวันออกเฉียงเหนือ">🏜️ ภาคอีสาน</option>
                <option value="ภาคกลาง">🌾 ภาคกลาง</option>
                <option value="ภาคตะวันออก">🌊 ภาคตะวันออก</option>
                <option value="ภาคตะวันตก">🌳 ภาคตะวันตก</option>
                <option value="ภาคใต้">🏝️ ภาคใต้</option>
            </select>

            <div class="relative flex-1">
                <input type="text" id="searchBox" onkeyup="filterList()" 
                       placeholder="🔍 ค้นหา: จังหวัด, เขต, ภาค (เช่น อีสาน)..." 
                       class="w-full p-4 rounded-xl bg-slate-900 text-cyan-300 border-2 border-slate-700 focus:border-cyan-500 outline-none transition-all">
            </div>
        </div>

        <!-- 💡 แถบ Guide วิธีใช้งาน (Usage Guide) ตามที่พี่วงสีเหลืองไว้ -->
        <div class="max-w-5xl mx-auto mb-10 p-4 bg-slate-800/30 border border-cyan-500/30 rounded-xl backdrop-blur-sm guide-bar">
            <div class="flex flex-col md:flex-row justify-around items-center gap-4">
                <span class="text-cyan-400 font-bold text-sm">💡 วิธีใช้งานหลอดสถานะ:</span>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-slate-500"></div>
                    <span class="text-xs text-slate-300">ซ้ายสุด: ยังไม่มีข้อมูล</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.6)]"></div>
                    <span class="text-xs text-slate-300">ตรงกลาง: ยังไม่ออก (ค้าง)</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></div>
                    <span class="text-xs text-slate-300">ขวาสุด: ออกแล้ว (คลิกชื่อเพื่อดูหลักฐาน)</span>
                </div>
            </div>
        </div>

        <!-- List Content -->
        <div id="loading" class="text-center py-20">
            <div class="animate-spin inline-block w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-cyan-500 text-xl">กำลังดึงข้อมูลฐานข้อมูล...</p>
        </div>

        <div id="itemList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- รายการเขตพื้นที่แบบ Slider จะมาโชว์ตรงนี้ผ่าน script.js -->
        </div>
    </div>

    <!-- Hidden Report Container -->
    <div id="reportSection" class="hidden">
        <div id="reportContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
