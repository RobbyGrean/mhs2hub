<body class="p-4 bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto">
        <!-- Header โฉบเฉี่ยว -->
        <header class="py-8 text-center">
            <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                JM Project
            </h1>
            <p class="text-xl text-slate-400 font-light">ติดตามเงินจ้างเหมาบริการ 245 เขตพื้นที่</p>
        </header>
        
        <!-- วางไว้บนสุดของโซนรายชื่อ หรือใต้ Header -->
<div class="flex flex-col md:flex-row gap-4 mb-8">
    <div class="flex-1">
        <input type="text" id="searchBox" onkeyup="filterList()" 
               placeholder="🔍 ค้นหาชื่อเขต..." 
               class="search-input shadow-2xl">
    </div>
    <!-- ปุ่มรายงานตัวโตๆ สำหรับชาวบ้าน -->
    <button onclick="generatePendingReport()" 
            class="bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-2xl font-bold text-xl transition-all shadow-lg flex items-center justify-center gap-2">
        <span>📄</span> ดึงรายงานเขตที่เงินยังไม่ออก
    </button>
</div>

<!-- พื้นที่แสดงรายงาน (จะซ่อนไว้ก่อน) -->
<div id="reportSection" class="hidden mb-10 p-8 bg-white text-slate-900 rounded-[30px] shadow-2xl border-4 border-red-500">
    <div class="flex justify-between items-center mb-6 border-b-2 border-slate-200 pb-4">
        <h2 class="text-3xl font-black text-red-600">⚠️ รายชื่อเขตที่เงินยังไม่ออก</h2>
        <button onclick="closeReport()" class="text-slate-400 hover:text-slate-900 text-3xl font-bold">✕</button>
    </div>
    <div id="reportContent" class="text-xl space-y-2">
        <!-- รายชื่อเขตที่ค้างจะมาโผล่ตรงนี้ -->
    </div>
    <div class="mt-8 pt-4 border-t border-dashed border-slate-300 text-right">
        <p id="reportTimestamp" class="text-slate-500 italic"></p>
        <button onclick="window.print()" class="mt-4 px-6 py-2 bg-slate-800 text-white rounded-xl font-bold">พิมพ์รายงานนี้ (Print)</button>
    </div>
</div>

        <!-- Search Bar ที่ชาวบ้านใช้ง่าย -->
        <div class="sticky top-4 z-40 mb-8">
            <input type="text" id="searchBox" onkeyup="filterList()" 
                   placeholder="พิมพ์ชื่อจังหวัด หรือชื่อเขตเพื่อค้นหา..." 
                   class="search-input w-full shadow-2xl text-white outline-none">
        </div>

        <!-- รายชื่อแบบ Card Base -->
        <div id="list-container" class="space-y-4">
            <!-- ข้อมูลจะถูกฉีดเข้าที่นี่โดย JS -->
        </div>
    </div>

    <!-- Modal ยืนยันสไตล์ทันสมัย -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border-2 border-blue-500/30 p-8 rounded-[30px] max-w-md w-full shadow-[0_0_50px_rgba(59,130,246,0.2)]">
            <div class="text-5xl mb-4">🔔</div>
            <h3 class="text-3xl font-bold mb-4 text-white">ยืนยันอีกครั้ง?</h3>
            <p id="modalText" class="text-xl text-slate-300 mb-8 leading-relaxed"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="py-4 bg-slate-700 rounded-2xl text-xl font-bold">ยกเลิก</button>
                <button id="confirmBtn" class="py-4 bg-blue-600 rounded-2xl text-xl font-bold shadow-lg shadow-blue-900/40">ยืนยัน</button>
            </div>
        </div>
    </div>
</body>
