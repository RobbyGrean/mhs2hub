<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Project - ระบบติดตามเงินออก</title>
    <!-- Tailwind CSS สำหรับ Layout สำเร็จรูป -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-white mb-2 tracking-tighter">JM PROJECT</h1>
            <p class="text-blue-400 font-bold uppercase tracking-widest">ระบบติดตามสถานะเงินออก (พี่ร็อบ Edition)</p>
        </div>

        <!-- Search Box -->
        <div class="mb-8 max-w-xl mx-auto">
            <input type="text" id="searchBox" onkeyup="filterList()" 
                   placeholder="🔍 ค้นหาชื่อเขต หรือ ภาค..." 
                   class="search-input w-full p-4 rounded-full bg-slate-800 text-white border-2 border-slate-700 focus:border-blue-500 outline-none transition-all">
        </div>

        <!-- Toolbar -->
        <div class="flex justify-center gap-4 mb-10">
            <button onclick="generatePendingReport()" 
                    class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-red-900/20 transition-all">
                📊 สรุปรายงานที่ยังค้าง
            </button>
        </div>

        <!-- Main List Container -->
        <div id="list-container" class="max-w-2xl mx-auto">
            <!-- ข้อมูลจะถูก Render จาก JS ตรงนี้ -->
            <div class="text-center p-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
                <p class="mt-4 text-slate-500">กำลังดึงข้อมูลจากระบบ...</p>
            </div>
        </div>

        <!-- Report Section (Hidden by Default) -->
        <div id="reportSection" class="hidden mt-20 p-8 bg-white rounded-[40px] shadow-2xl overflow-hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 tracking-tighter">สรุปรายการที่ต้องติดตาม</h2>
                <button onclick="closeReport()" class="text-slate-400 hover:text-red-500 text-4xl">&times;</button>
            </div>
            <p id="reportTimestamp" class="text-slate-400 mb-6 font-bold uppercase tracking-widest text-sm"></p>
            <div id="reportContent" class="overflow-x-auto text-slate-800">
                <!-- ตารางรายงานจะมาโชว์ตรงนี้ -->
            </div>
            <div class="mt-10 flex justify-center no-print">
                <button onclick="window.print()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-black transition-all">
                    🖨️ สั่งพิมพ์รายงาน (PDF)
                </button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-bg hidden">
        <div class="modal-content scale-up shadow-2xl border-2 border-blue-500/30">
            <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">❓</span>
            </div>
            <p id="modalText" class="text-2xl font-bold text-white mb-8 leading-tight"></p>
            <div class="flex gap-4">
                <button id="confirmBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold transition-all">ยืนยัน</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 py-4 rounded-2xl font-bold transition-all">ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Space Preview Card (Popup เมื่อเงินออก) -->
    <div id="previewCard" class="hidden scale-0 opacity-0">
        <div class="flex items-center gap-4 mb-4">
            <img id="prevImg" src="" alt="icon" class="w-16 h-16 rounded-2xl bg-white p-1">
            <div>
                <h4 id="prevName" class="text-xl font-black text-white leading-tight"></h4>
                <p class="text-emerald-400 font-bold text-xs">STATUS: เงินออกแล้ว ✅</p>
            </div>
        </div>
        <a id="prevLink" href="#" target="_blank" class="block w-full text-center bg-blue-600/20 hover:bg-blue-600 text-blue-400 py-3 rounded-xl font-bold border border-blue-500/30 transition-all">
            🌐 ไปที่เว็บไซต์เขต
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
