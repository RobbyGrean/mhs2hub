<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Recommended List - Center Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าพื้นหลังสีน้ำเงิน และจัดวางกึ่งกลาง */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* กลางแนวนอน */
            align-items: center;     /* กลางแนวตั้ง */
            min-height: 100vh;       /* เต็มความสูงจอ */
            background: linear-gradient(135deg, #1e3a8a, #3b82f6); /* ไล่เฉดน้ำเงินให้ดูแพง */
            font-family: 'Sarabun', sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h3 { color: #1e3a8a; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box; /* ป้องกันกล่องล้น */
        }

        input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        .status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .ready { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3>ระบบเช็คชื่อ (ตัวเทส)</h3>
    
    <input list="schoolOptions" id="schoolInput" placeholder="⏳ กำลังเชื่อมต่อข้อมูล..." disabled>
    
    <datalist id="schoolOptions"></datalist>

    <div id="status" class="status">กำลังดึงข้อมูล 176 โรงเรียน...</div>
</div>

<script>
    // 🔴 อย่าลืมวาง URL /exec ของพี่ร้อบตรงนี้ครับ!
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxAcJS270SGvBiXvV2A52ZpnsOMyqOirdzNaq3dSyq-4Gp-9P_srCq9mUls07ymR8Jm9A/exec"; 

    fetch(scriptUrl + "?action=getSchoolList")
      .then(res => res.json())
      .then(data => {
        const dl = document.getElementById('schoolOptions');
        const input = document.getElementById('schoolInput');
        const status = document.getElementById('status');

        // ฉีดข้อมูลเข้าลิสต์
        data.schools.forEach(name => {
          let opt = document.createElement('option');
          opt.value = name;
          dl.appendChild(opt);
        });

        // เปิดให้พิมพ์ได้ และเปลี่ยนสถานะ
        input.disabled = false;
        input.placeholder = "พิมพ์ชื่อโรงเรียนได้เลย...";
        status.innerText = "✅ ข้อมูลพร้อมแล้ว (176 โรงเรียน)";
        status.classList.add('ready');
      })
      .catch(err => {
        document.getElementById('status').innerText = "❌ เชื่อมต่อล้มเหลว: " + err;
      });
</script>

</body>
</html>
